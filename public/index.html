<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfbfb" />
    <title>离线书架</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=24-clean-manage-info-20260530" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Library</p>
          <h1>文库</h1>
        </div>
        <div class="top-actions">
          <button class="cloud-mini" id="searchToggleButton" type="button" title="搜索" aria-label="搜索">⌕</button>
          <button class="cloud-mini" id="cloudPanelButton" type="button" title="云端同步" aria-label="云端同步">☁</button>
          <button class="cloud-mini import-mini" id="importDrawerButton" type="button" title="导入作品" aria-label="导入作品">＋</button>
          <button class="icon-button" id="themeToggle" title="切换明暗" aria-label="切换明暗">◐</button>
        </div>
      </header>

      <main class="layout">
        <aside class="panel library-panel" aria-label="书架">
          <form class="import-box import-drawer" id="importForm">
            <label for="sourceUrl">原站链接</label>
            <div class="url-row">
              <input id="sourceUrl" name="sourceUrl" type="url" placeholder="https://作品站点/works/..." autocomplete="off" />
              <button type="submit">保存</button>
            </div>
            <button class="ghost-button" type="button" id="manualOpen">手动导入</button>
            <label class="file-import">
              <span>导入 HTML 文件</span>
              <input id="htmlFileInput" type="file" accept=".html,.htm,text/html" />
            </label>
            <p class="helper-text">手机推荐：在 原站 点 Download → HTML，再回这里导入文件。</p>
            <p class="status" id="importStatus" role="status"></p>
          </form>

          <section class="folder-tools shelf-directory">
            <div class="section-title">
              <h2>文库</h2>
              <button class="tiny-button" id="newFolderButton" title="新建文件夹" aria-label="新建文件夹">＋</button>
            </div>
            <div class="folder-list" id="folderList"></div>
          </section>

          <section class="sync-tools cloud-section">
            <div class="section-title">
              <h2>云端同步</h2>
            </div>
            <div class="cloud-box">
              <p class="helper-text" id="cloudUser">未登录云端</p>
              <input id="cloudEmail" type="email" placeholder="邮箱" autocomplete="email" />
              <div class="cloud-actions">
                <button class="ghost-button" type="button" id="cloudLoginButton">登录 / 发送邮件</button>
                <button class="ghost-button hidden" type="button" id="cloudLogoutButton">退出</button>
              </div>
              <div class="backup-actions">
                <button class="ghost-button" type="button" id="cloudUploadButton" disabled>上传云端</button>
                <button class="ghost-button" type="button" id="cloudDownloadButton" disabled>下载云端</button>
              </div>
              <p class="status" id="cloudStatus">登录后可同步手机和电脑。</p>
            </div>
          </section>

          <section class="sync-tools backup-section">
            <div class="section-title">
              <h2>备份</h2>
            </div>
            <div class="backup-actions">
              <button class="ghost-button" type="button" id="exportLibraryButton">导出书架</button>
              <label class="file-import compact-file-import">
                <span>导入书架</span>
                <input id="libraryFileInput" type="file" accept=".json,application/json" />
              </label>
            </div>
            <p class="helper-text">电脑抓取后导出书架，把 JSON 文件发到手机导入。</p>
          </section>

          <section class="search-tools">
            <label for="searchInput">搜索</label>
            <input id="searchInput" type="search" placeholder="标题、作者、CP、备注" />
          </section>

          <section class="work-list" id="workList" aria-label="作品列表"></section>
        </aside>

        <article class="reader-panel" id="readerPanel">
          <div class="empty-state" id="emptyState">
            <div class="empty-mark">原站</div>
            <h2>把想读的作品收进来</h2>
            <p>作品会保存在这台设备的浏览器里，断网后也能打开。你可以按 CP、坑位、阅读状态或任何习惯建立文件夹。</p>
          </div>

          <div class="reader hidden" id="reader">
            <div class="reader-actions">
              <button class="ghost-button" id="backToList">书架</button>
              <div>
                <button class="ghost-button square-button" id="fontDecrease" title="缩小字号" aria-label="缩小字号">A-</button>
                <button class="ghost-button square-button" id="fontIncrease" title="放大字号" aria-label="放大字号">A+</button>
                <button class="ghost-button" id="highlightButton">高亮</button>
                <button class="ghost-button" id="editMetaButton">整理</button>
                <button class="danger-button" id="deleteWorkButton">删除</button>
              </div>
            </div>

            <header class="work-header">
              <p id="workFolder" class="work-folder"></p>
              <h2 id="workTitle"></h2>
              <p id="workAuthor"></p>
              <div class="tag-row" id="workTags"></div>
            </header>

            <section class="chapter-strip">
              <button class="ghost-button" id="prevChapter">上一章</button>
              <button class="ghost-button chapter-current" id="openChapterDialog">目录</button>
              <button class="ghost-button" id="nextChapter">下一章</button>
            </section>

            <section class="metadata-block" id="metadataBlock"></section>
            <section class="notes-block">
              <label for="noteInput">我的备注</label>
              <textarea id="noteInput" placeholder="读后感、雷点提醒、名场面、进度……"></textarea>
            </section>
            <section class="summary-block" id="summaryBlock"></section>
            <h3 class="chapter-heading" id="chapterTitle"></h3>
            <section class="work-content userstuff" id="workContent"></section>
          </div>
        </article>
      </main>
    </div>

    <nav class="reading-bar hidden" id="readingBar" aria-label="阅读进度">
      <button class="ghost-button" id="barTocButton">目录</button>
      <input id="progressRange" type="range" min="0" max="1000" value="0" />
      <span id="progressText">0%</span>
      <button class="ghost-button" id="bookmarkButton">书签</button>
    </nav>

    <div class="reader-page-count hidden" id="readerPageCount">1 / 1</div>

    <div class="reader-console hidden" id="readerConsole">
      <div class="reader-console-top">
        <button class="console-text-button" id="consoleBackButton" type="button">← 返回</button>
      </div>
      <div class="reader-console-bottom">
        <div class="console-progress-row">
          <button class="console-text-button chapter-jump" id="consolePrevChapter" type="button">上一章</button>
          <input id="consoleProgress" type="range" min="0" max="1000" value="0" />
          <button class="console-text-button chapter-jump" id="consoleNextChapter" type="button">下一章</button>
        </div>
        <div class="console-action-row">
          <button class="console-icon-button" id="consoleLibraryButton" type="button">目录</button>
          <button class="console-icon-button" id="consoleSettingsButton" type="button">设置</button>
          <button class="console-icon-button" id="consoleBackgroundButton" type="button">背景</button>
        </div>
      </div>
    </div>

    <dialog id="readerSettingsDialog">
      <form method="dialog" class="dialog-card compact-settings">
        <h2>阅读设置</h2>
        <label for="settingsTurnMode">翻页方式</label>
        <select id="settingsTurnMode">
          <option value="tap">点击翻页</option>
          <option value="swipe">滑动翻页</option>
          <option value="both">点击 + 滑动</option>
          <option value="scroll">连续滚动</option>
        </select>
        <div class="stepper-row">
          <span>字号</span>
          <div class="stepper-control">
            <button type="button" data-stepper="font" data-delta="-1">−</button>
            <output id="settingsFontSize">18px</output>
            <button type="button" data-stepper="font" data-delta="1">＋</button>
          </div>
        </div>
        <div class="stepper-row">
          <span>行距</span>
          <div class="stepper-control">
            <button type="button" data-stepper="line" data-delta="-1">−</button>
            <output id="settingsLineHeight">1.8</output>
            <button type="button" data-stepper="line" data-delta="1">＋</button>
          </div>
        </div>
        <div class="stepper-row">
          <span>页边距</span>
          <div class="stepper-control">
            <button type="button" data-stepper="margin" data-delta="-1">−</button>
            <output id="settingsSideMargin">20px</output>
            <button type="button" data-stepper="margin" data-delta="1">＋</button>
          </div>
        </div>
        <button class="ghost-button" id="settingsNightButton" type="button">夜间模式</button>
        <menu>
          <button value="close">完成</button>
        </menu>
      </form>
    </dialog>

    <dialog id="backgroundDialog">
      <form method="dialog" class="dialog-card compact-settings">
        <h2>背景</h2>
        <div class="background-grid">
          <button class="bg-choice" type="button" data-bg="white">纯白</button>
          <button class="bg-choice" type="button" data-bg="light">浅灰</button>
          <button class="bg-choice" type="button" data-bg="medium">中灰</button>
          <button class="bg-choice" type="button" data-bg="darkgray">暗灰</button>
          <button class="bg-choice" type="button" data-bg="black">纯黑</button>
        </div>
        <menu>
          <button value="close">完成</button>
        </menu>
      </form>
    </dialog>

    <dialog id="chapterDialog">
      <div class="dialog-card chapter-dialog-card">
        <div class="dialog-head">
          <h2>阅读导航</h2>
          <div class="dialog-actions">
            <button class="ghost-button" id="chapterSettingsButton" type="button">设置</button>
            <button class="ghost-button" id="closeChapterDialog" type="button">关闭</button>
          </div>
        </div>
        <p class="chapter-progress" id="chapterProgressText"></p>
        <section class="chapter-work-info" id="chapterWorkInfo"></section>
        <h3>章节</h3>
        <div class="chapter-list" id="chapterList"></div>
        <h3>书签</h3>
        <div class="bookmark-list" id="bookmarkList"></div>
      </div>
    </dialog>

    <dialog id="folderDialog">
      <form method="dialog" class="dialog-card" id="folderForm">
        <h2>新建文件夹</h2>
        <label for="folderName">名称</label>
        <input id="folderName" required maxlength="40" placeholder="例如：授翻、Steve/Bucky、未读" />
        <menu>
          <button value="cancel" class="ghost-button" formnovalidate>取消</button>
          <button value="save">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="metaDialog">
      <form method="dialog" class="dialog-card" id="metaForm">
        <h2>整理作品</h2>
        <label for="metaFolder">文件夹</label>
        <select id="metaFolder"></select>
        <label for="metaCustomTags">自定义标签</label>
        <input id="metaCustomTags" placeholder="用逗号分隔，比如 HE, 长篇, 已读" />
        <menu>
          <button value="cancel" class="ghost-button" formnovalidate>取消</button>
          <button value="save">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="workManageDialog">
      <form method="dialog" class="dialog-card manage-card" id="workManageForm">
        <h2 id="manageWorkTitle">整理</h2>
        <label for="manageFolderSelect">文件夹</label>
        <select id="manageFolderSelect"></select>
        <label for="manageTagInput">小 tag</label>
        <div class="mini-tag-row editable-tags" id="manageTagList"></div>
        <div class="inline-action-row">
          <input id="manageTagInput" maxlength="28" placeholder="例如：已读、长篇、HE" />
          <button class="ghost-button" id="manageAddTagButton" type="button">添加</button>
        </div>
        <div class="manage-actions">
          <button class="ghost-button" id="manageDownloadButton" type="button">下载</button>
          <button class="danger-button" id="manageDeleteWorkButton" type="button">删除</button>
        </div>
        <menu>
          <button value="cancel" class="ghost-button" formnovalidate>关闭</button>
        </menu>
      </form>
    </dialog>

    <dialog id="folderManageDialog">
      <form method="dialog" class="dialog-card manage-card" id="folderManageForm">
        <h2 id="manageFolderTitle">文件夹</h2>
        <div class="manage-section">
          <span>位置</span>
          <div class="manage-actions">
            <button class="ghost-button" id="manageFolderLeftButton" type="button">左移</button>
            <button class="ghost-button" id="manageFolderRightButton" type="button">右移</button>
          </div>
        </div>
        <div class="manage-section danger-zone">
          <span>危险操作</span>
          <button class="danger-button" id="manageDeleteFolderButton" type="button">删除文件夹</button>
        </div>
        <menu>
          <button value="cancel" class="ghost-button" formnovalidate>关闭</button>
        </menu>
      </form>
    </dialog>

    <dialog id="manualDialog">
      <form method="dialog" class="dialog-card manual-card" id="manualForm">
        <h2>手动导入</h2>
        <label for="manualTitle">标题</label>
        <input id="manualTitle" required />
        <label for="manualAuthor">作者</label>
        <input id="manualAuthor" />
        <label for="manualUrl">原链接</label>
        <input id="manualUrl" type="url" />
        <label for="manualContent">正文</label>
        <textarea id="manualContent" required placeholder="如果在线网页不能直接读取原站，可以先把正文粘贴进来。"></textarea>
        <menu>
          <button value="cancel" class="ghost-button" formnovalidate>取消</button>
          <button value="save">保存</button>
        </menu>
      </form>
    </dialog>

    <script src="./app.js?v=24-clean-manage-info-20260530" type="module"></script>
  </body>
</html>
